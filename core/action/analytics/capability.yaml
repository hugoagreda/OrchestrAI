namespace: analytics
version: "1.0.0"
description: "Analytics and feedback capability for runtime outputs."

actions:
  analyze_metrics:
    description: "Builds a lightweight analytics summary from runtime memory."
    handler: "analytics_actions.analyze_metrics"
    required_payload: []
    provides_context:
      - "analytics_summary"

governance:
  isolation_level: "medium"
  allow_external_calls: false
