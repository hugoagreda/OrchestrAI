# Summary: Defines the publishing capability, including publication-preparation actions, handlers, and governance policy.
namespace: publishing
version: "1.0.0"
description: "Content publishing and distribution capability."

actions:
  prepare_publish:
    description: "Prepares content for publication."
    handler: "publishing_actions.prepare_publish"
    required_payload: []
    provides_context:
      - "publish_ready"

governance:
  isolation_level: "medium"
  allow_external_calls: true
