name: enterprise_premium
version: 1.0.0

autonomy: medium

restricted_capabilities:
  - publishing.*

allowed_actions:
  - generate_script
  - analyze_metrics

model_policy:
  content.*:
    optimize_for:
      quality: 0.8
      cost: 0.1
      latency: 0.1

  analytics.*:
    optimize_for:
      quality: 0.4
      latency: 0.2